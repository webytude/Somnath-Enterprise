on: 
  push:
    branches:
      - main
name: 🚀 Deploy website on push on LIVE using FTP
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.4.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: '/public_html/'
        timeout: 60000
        log-level: verbose
        # One-time only: uncomment for a single run to wipe the target dir and
        # clear the stale sync state that triggers the 502 (APPE) error, then
        # comment it back out — it deletes ALL files in server-dir on every run.
        # dangerous-clean-slate: true
